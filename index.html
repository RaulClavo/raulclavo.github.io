<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Juego en Vivo</title>
<style>
body { font-family: Arial; text-align: center; margin-top: 20px; }
button { margin: 5px; padding: 10px 18px; font-size: 16px; }
#status { margin: 14px 0; font-size: 18px; font-weight: bold; }
#voteArea, #controllerArea, #spectatorArea { display:none; margin-top:20px; }
#votesStatus { margin-top: 8px; font-style: italic; }
#playersInfo { margin-top: 8px; }
.board { display: grid; grid-template-columns: repeat(5, 60px); grid-gap: 4px; justify-content: center; margin-top:20px; }
.cell { width: 60px; height: 60px; border: 1px solid #aaa; display:flex; align-items:center; justify-content:center; font-weight:bold; }
.goal { background: lightgreen; }
#mode2Container { display:flex; justify-content: space-around; margin-top:20px; }
</style>
</head>
<body>
<h1>Juego en Vivo</h1>
<div id="status">Comprobando estado...</div>
<div>
    <button id="joinBtn">Unirse</button>
</div>
<div id="playersInfo"></div>

<!-- Votación -->
<div id="voteArea">
    <h3>Votación del modo</h3>
    <button onclick="castVote('mode1')">Modo 1 — Una pantalla</button>
    <button onclick="castVote('mode2')">Modo 2 — Dos pantallas</button>
    <div id="votesStatus">Esperando votos...</div>
</div>

<!-- Área de mando (jugadores) -->
<div id="controllerArea">
    <h2>Mando del Jugador</h2>
    <button onclick="addSignal('FORWARD')">Avanzar</button>
    <button onclick="addSignal('TURN_LEFT')">Girar Izq</button>
    <button onclick="addSignal('TURN_RIGHT')">Girar Der</button>
    <button onclick="executeQueue()">Ejecutar ruta</button>
    <div id="queueDisplay">Ruta: []</div>
</div>

<!-- Área de espectador -->
<div id="spectatorArea">
    <h2>Juego en curso</h2>
    <div id="board"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyDGYEYs5YFZqMpcU0rJSeLxdzCt1iaumis",
    authDomain: "welcomedayarise.firebaseapp.com",
    databaseURL: "https://welcomedayarise-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "welcomedayarise",
    storageBucket: "welcomedayarise.appspot.com",
    messagingSenderId: "417894091538",
    appId: "1:417894091538:web:a2eab16a056dfc902881cb"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let playerId = null;
let gameStarted = false;
let gameMode = null;
const votes = {};
const playerQueues = {};
const boardSize = 5;
let playerPositions = {};

let nivelActual = 0;
let tiemposPorJugador = {};
let tiempoInicioNivel = null;
const NIVELES_MODO1 = 5;

let modo2Timer = null;
let modo2TiempoRestante = 60; // segundos
let nivelesPorJugador = {};

// Inicia el temporizador de modo 2
function iniciarModo2Timer() {
    modo2TiempoRestante = 60;
    statusDiv.textContent = `Tiempo restante: ${modo2TiempoRestante}s`;
    modo2Timer = setInterval(() => {
        modo2TiempoRestante--;
        statusDiv.textContent = `Tiempo restante: ${modo2TiempoRestante}s`;
        if (modo2TiempoRestante <= 0) {
            clearInterval(modo2Timer);
            mostrarResultadosModo2();
        }
    }, 1000);
}

// Mostrar resultados de modo 2
function mostrarResultadosModo2() {
    let resultado = "<h2>Resultados</h2>";
    let ranking = [];
    for(const pid in nivelesPorJugador) {
        resultado += `Jugador ${pid.slice(-4)}: ${nivelesPorJugador[pid]} niveles<br>`;
        ranking.push({pid, score: nivelesPorJugador[pid]});
    }
    ranking.sort((a,b)=>b.score-a.score);
    resultado += `<br><b>Ganador: Jugador ${ranking[0].pid.slice(-4)}</b>`;
    statusDiv.innerHTML = resultado;
    controllerArea.style.display = "none";
    spectatorArea.style.display = "block";
}

const joinBtn = document.getElementById("joinBtn");
const statusDiv = document.getElementById("status");
const playersInfo = document.getElementById("playersInfo");
const voteArea = document.getElementById("voteArea");
const votesStatus = document.getElementById("votesStatus");
const controllerArea = document.getElementById("controllerArea");
const spectatorArea = document.getElementById("spectatorArea");
const queueDisplay = document.getElementById("queueDisplay");
const boardDiv = document.getElementById("board");

// ---- Lobby ----
async function updateStatus() {
    const snap = await db.ref("players").once("value");
    const players = snap.val() || {};
    const ids = Object.keys(players);
    playersInfo.innerHTML = `Jugadores: ${ids.length}/2 <br>${ids.join(", ") || "—"}`;
    
    if(playerId && !gameStarted) statusDiv.textContent = "Estás jugando";
    else if(!playerId && ids.length<2) statusDiv.textContent = `Huecos libres: ${2-ids.length}`;
    else if(!playerId && ids.length>=2) statusDiv.textContent = "Eres espectador";

    voteArea.style.display = (playerId && ids.length===2 && !gameStarted) ? "block" : "none";
}

db.ref("players").on("value", snapshot => {
    const players = snapshot.val()||{};
    if(gameStarted && Object.keys(players).length<2) cancelGame();
    updateStatus();
});

joinBtn.onclick = async () => {
    const snap = await db.ref("players").once("value");
    const players = snap.val()||{};
    if(playerId || Object.keys(players).length>=2){
        alert("Ya hay 2 jugadores, eres espectador");
        playerId=null;
        controllerArea.style.display="none";
        spectatorArea.style.display="block";
        return;
    }
    playerId = Date.now().toString();
    await db.ref('players/'+playerId).set({joinedAt: Date.now()});
    controllerArea.style.display="block";
    spectatorArea.style.display="none"; // Oculta el área de espectador al unirse
    joinBtn.disabled = true; // Desactiva el botón de unirse
    statusDiv.style.display = "none"; // Oculta el mensaje de estado
    updateStatus();
};

// ---- Señales ----
function addSignal(sig){
    if(!playerQueues[playerId]) playerQueues[playerId]=[];
    playerQueues[playerId].push(sig);
    queueDisplay.textContent="Ruta: ["+playerQueues[playerId].join(",")+"]";
}

function executeQueue(){
    if(!playerQueues[playerId] || playerQueues[playerId].length===0) return;
    const queue = [...playerQueues[playerId]];
    playerQueues[playerId]=[];
    queueDisplay.textContent="Ruta: []";
    queue.forEach(sig=>{
        db.ref('signals').push({signal:sig, from:playerId, time:Date.now()});
    });
}

function castVote(mode){
    if(!playerId) return;
    db.ref('signals').push({signal:"VOTE:"+mode, from:playerId, time:Date.now()});
}

db.ref('signals').on('child_added', snap=>{
    const data = snap.val();
    if(!data) return;
    
    if(data.signal.startsWith("VOTE:")){
        votes[data.from] = data.signal.split(":")[1];
        votesStatus.textContent = Object.entries(votes).map(([pid,m])=>pid.slice(-4)+"→"+m).join(" | ");
        if(!gameStarted && Object.keys(votes).length>=2){
            const counts = Object.values(votes).reduce((acc,m)=>{
                acc[m]=(acc[m]||0)+1; return acc;
            },{});
            const selectedMode = counts["mode2"]>counts["mode1"] ? "mode2" : counts["mode1"]>counts["mode2"] ? "mode1" : Math.random()<0.5?"mode1":"mode2";
            db.ref('signals').push({signal:"START:"+selectedMode, from:"system", time:Date.now()});
        }
    } else if(data.signal.startsWith("START:")){
        startGame(data.signal.split(":")[1]);
    } else if(gameStarted){
        processSignal(data);
    }
});

// ---- Juego ----
function startGame(mode){
    if(gameStarted) return;
    gameMode=mode;
    gameStarted=true;
    voteArea.style.display="none";
    controllerArea.style.display=playerId?"block":"none";
    spectatorArea.style.display = playerId ? "none" : "block";
    statusDiv.textContent="Juego iniciado ("+mode+")";

    db.ref('players').once('value').then(psnap=>{
        const players = psnap.val()||{};
        const ids = Object.keys(players);
        playerPositions={};
        ids.forEach((pid,i)=>{
            playerPositions[pid]={x:0,y:boardSize-1,symbol:i===0?"▲":"●",orientation:0};
        });
        if(mode === "mode1") {
            nivelActual = 0;
            tiemposPorJugador = {};
            tiempoInicioNivel = Date.now();
        } else if(mode === "mode2") {
            nivelesPorJugador = {};
            iniciarModo2Timer();
        }
        currentLevel = 0;
        currentLevelData = generateLevel(Date.now());
        renderBoard();
    });
}

function cancelGame(){
    gameStarted=false;
    voteArea.style.display="none";
    controllerArea.style.display="none";
    spectatorArea.style.display="none";
    playerPositions={};
    gameMode=null;
    statusDiv.textContent="Partida cancelada. Vuelve al lobby.";
}

function checkGoal(pid) {
    const level = currentLevelData;
    const p = playerPositions[pid];
    if (p.x === level.goal.x && p.y === level.goal.y) {
        if(gameMode === "mode1") {
            // Guarda tiempo de este nivel
            const tiempo = Date.now() - tiempoInicioNivel;
            if(!tiemposPorJugador[pid]) tiemposPorJugador[pid] = [];
            tiemposPorJugador[pid].push(tiempo);

            nivelActual++;
            if(nivelActual < NIVELES_MODO1) {
                // Nuevo nivel
                tiempoInicioNivel = Date.now();
                currentLevelData = generateLevel(Date.now() + nivelActual);
                for (const id in playerPositions) {
                    playerPositions[id] = {x:0, y:boardSize-1, symbol:playerPositions[id].symbol, orientation:0};
                }
                renderBoard();
            } else {
                // Fin de partida, muestra resultados
                mostrarResultadosModo1();
            }
        } else if(gameMode === "mode2") {
            // Suma nivel para el jugador
            if(!nivelesPorJugador[pid]) nivelesPorJugador[pid] = 0;
            nivelesPorJugador[pid]++;
            currentLevelData = generateLevel(Date.now() + nivelesPorJugador[pid]);
            for (const id in playerPositions) {
                playerPositions[id] = {x:0, y:boardSize-1, symbol:playerPositions[id].symbol, orientation:0};
            }
            renderBoard();
        }
    }
}

// Modifica processSignal para llamar a checkGoal después de mover
function processSignal(data){
    const pid = data.from;
    if(!playerPositions[pid]) return;

    const sig = data.signal;
    const p = playerPositions[pid];
    const level = currentLevelData;

    let nx = p.x, ny = p.y, no = p.orientation;

    if(sig==="FORWARD"){
        if(no===0 && ny>0) ny--;
        else if(no===1 && nx<boardSize-1) nx++;
        else if(no===2 && ny<boardSize-1) ny++;
        else if(no===3 && nx>0) nx--;

        // Verifica si la nueva posición es un obstáculo
        if(!level.obstacles.some(o=>o.x===nx && o.y===ny)){
            p.x = nx;
            p.y = ny;
            checkGoal(pid); // <-- Añade esta línea aquí
        }
    } else if(sig==="TURN_LEFT") p.orientation=(p.orientation+3)%4;
    else if(sig==="TURN_RIGHT") p.orientation=(p.orientation+1)%4;

    renderBoard();
}

function renderBoard(){
    boardDiv.innerHTML="";
    const level = currentLevelData;
    if(gameMode==="mode1" || !gameMode){
        const b=document.createElement("div");
        b.className="board";
        for(let i=0;i<boardSize;i++){
            for(let j=0;j<boardSize;j++){
                const cell=document.createElement("div");
                cell.className="cell";
                // Obstáculo
                if(level && level.obstacles.some(o=>o.x===j && o.y===i)) {
                    cell.style.background="gray";
                }
                // Meta
                if(level && i===level.goal.y && j===level.goal.x) cell.classList.add("goal");
                for(const pid in playerPositions){
                    const p=playerPositions[pid];
                    if(p.x===j && p.y===i){
                        const span=document.createElement("span");
                        span.textContent=p.symbol;
                        span.style.color=p.symbol==="▲"?"red":"blue";
                        span.style.fontSize="24px";
                        cell.appendChild(span);
                    }
                }
                b.appendChild(cell);
            }
        }
        boardDiv.appendChild(b);
    } else if(gameMode==="mode2"){
        const container=document.createElement("div");
        container.id="mode2Container";
        const pids=Object.keys(playerPositions);
        pids.forEach(pid=>{
            const wrapper=document.createElement("div");
            const title=document.createElement("div");
            title.textContent="Jugador "+pid.slice(-4);
            wrapper.appendChild(title);
            const b=document.createElement("div");
            b.className="board";
            const p=playerPositions[pid];
            for(let i=0;i<boardSize;i++){
                for(let j=0;j<boardSize;j++){
                    const cell=document.createElement("div");
                    cell.className="cell";
                    if(level && level.obstacles.some(o=>o.x===j && o.y===i)) {
                        cell.style.background="gray";
                    }
                    if(level && i===level.goal.y && j===level.goal.x) cell.classList.add("goal");
                    if(p.x===j && p.y===i){
                        const span=document.createElement("span");
                        span.textContent=p.symbol;
                        span.style.color=p.symbol==="▲"?"red":"blue";
                        span.style.fontSize="24px";
                        cell.appendChild(span);
                    }
                    b.appendChild(cell);
                }
            }
            wrapper.appendChild(b);
            container.appendChild(wrapper);
        });
        boardDiv.appendChild(container);
    }
}

// Genera un nivel aleatorio con obstáculos y meta aleatoria
function generateLevel(seed = Date.now()) {
    // PRNG simple para sincronizar niveles
    function random() {
        seed = (seed * 9301 + 49297) % 233280;
        return seed / 233280;
    }
    // Meta aleatoria (no en la casilla de inicio)
    let goal;
    do {
        goal = {
            x: Math.floor(random() * boardSize),
            y: Math.floor(random() * boardSize)
        };
    } while (goal.x === 0 && goal.y === boardSize - 1);

    // Obstáculos aleatorios (máx 5, sin tapar inicio ni meta)
    let obstacles = [];
    let used = {};
    used[`0,${boardSize-1}`] = true;
    used[`${goal.x},${goal.y}`] = true;
    let maxObstacles = 5;
    while (obstacles.length < maxObstacles) {
        let ox = Math.floor(random() * boardSize);
        let oy = Math.floor(random() * boardSize);
        let key = `${ox},${oy}`;
        if (!used[key]) {
            obstacles.push({x: ox, y: oy});
            used[key] = true;
        }
    }
    return {goal, obstacles};
}

function mostrarResultadosModo1() {
    let resultado = "<h2>Resultados</h2>";
    let ranking = [];
    for(const pid in tiemposPorJugador) {
        const total = tiemposPorJugador[pid].reduce((a,b)=>a+b,0);
        resultado += `Jugador ${pid.slice(-4)}: ${(total/1000).toFixed(2)} segundos<br>`;
        ranking.push({pid, total});
    }
    ranking.sort((a,b)=>a.total-b.total);
    resultado += `<br><b>Ganador: Jugador ${ranking[0].pid.slice(-4)}</b>`;
    statusDiv.innerHTML = resultado;
    controllerArea.style.display = "none";
    spectatorArea.style.display = "block";
}

updateStatus();

// --- Sincronizar modo de juego para espectadores ---
db.ref('signals').orderByChild('signal').equalTo('START:mode1').on('value', snap => {
    const val = snap.val();
    if(val && !gameStarted) {
        gameMode = "mode1";
        gameStarted = true;
        voteArea.style.display = "none";
        controllerArea.style.display = playerId ? "block" : "none";
        // Solo mostrar el área de espectador si NO eres jugador
        spectatorArea.style.display = playerId ? "none" : "block";
        statusDiv.textContent = "Juego iniciado (mode1)";
        db.ref('players').once('value').then(psnap => {
            const players = psnap.val()||{};
            const ids = Object.keys(players);
            playerPositions={};
            ids.forEach((pid,i)=>{
                playerPositions[pid]={x:0,y:boardSize-1,symbol:i===0?"▲":"●",orientation:0};
            });
            renderBoard();
        });
    }
});
db.ref('signals').orderByChild('signal').equalTo('START:mode2').on('value', snap => {
    const val = snap.val();
    if(val && !gameStarted) {
        gameMode = "mode2";
        gameStarted = true;
        voteArea.style.display = "none";
        controllerArea.style.display = playerId ? "block" : "none";
        // Solo mostrar el área de espectador si NO eres jugador
        spectatorArea.style.display = playerId ? "none" : "block";
        statusDiv.textContent = "Juego iniciado (mode2)";
        db.ref('players').once('value').then(psnap => {
            const players = psnap.val()||{};
            const ids = Object.keys(players);
            playerPositions={};
            ids.forEach((pid,i)=>{
                playerPositions[pid]={x:0,y:boardSize-1,symbol:i===0?"▲":"●",orientation:0};
            });
            renderBoard();
        });
    }
});

// --- Manejar cierre de ventana ---
window.addEventListener("beforeunload", async function(e) {
    const snap = await db.ref("players").once("value");
    const players = snap.val() || {};
    if (playerId && players[playerId]) {
        await db.ref('signals').push({signal:"CANCEL_GAME", from:playerId, time:Date.now()});
    }
});

// Escucha la señal de cancelación de partida
db.ref('signals').on('child_added', snap => {
    const data = snap.val();
    if (data && data.signal === "CANCEL_GAME") {
        // Borra todas las señales primero
        db.ref("signals").remove().then(() => {
            // Después borra los jugadores
            db.ref("players").remove();
            // Cancela la partida localmente
            cancelGame();
            updateStatus();
        });
    }
});
</script>
</body>
</html>
