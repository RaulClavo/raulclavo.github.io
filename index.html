<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Juego en Vivo</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 50px; }
    button { margin: 5px; padding: 10px 20px; font-size: 18px; }
    #signals { margin-top: 20px; font-size: 24px; }
  </style>
</head>
<body>
  <h1>Juego en Vivo</h1>
  <button id="joinBtn">Unirse</button>
  <div id="controls" style="display:none;">
    <h2>Tus señales</h2>
    <button onclick="sendSignal('A')">A</button>
    <button onclick="sendSignal('B')">B</button>
    <button onclick="sendSignal('C')">C</button>
    <button onclick="sendSignal('D')">D</button>
    <button onclick="sendSignal('E')">E</button>
  </div>

  <h2>Señales enviadas</h2>
  <div id="signals"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.6.8/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.8/firebase-database.js"></script>
  <script>
    // 🔥 Configura tu Firebase (crea un proyecto gratis en Firebase y pega tus claves aquí)
    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_PROJECT.firebaseapp.com",
      databaseURL: "https://TU_PROJECT.firebaseio.com",
      projectId: "TU_PROJECT",
      storageBucket: "TU_PROJECT.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abcd"
    };
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let playerId = null;

    // Botón unirse
    document.getElementById("joinBtn").onclick = async () => {
      const playersRef = db.ref("players");
      const snapshot = await playersRef.get();
      const players = snapshot.val() || {};

      if (Object.keys(players).length < 2) {
        playerId = Date.now(); // id simple
        playersRef.child(playerId).set(true);
        document.getElementById("controls").style.display = "block";
      } else {
        alert("Ya hay 2 jugadores, eres espectador.");
      }
    };

    // Enviar señal
    function sendSignal(signal) {
      db.ref("signals").push({ signal, from: playerId, time: Date.now() });
    }

    // Escuchar señales
    db.ref("signals").on("child_added", (snap) => {
      const data = snap.val();
      const div = document.getElementById("signals");
      div.innerHTML = `<div>${data.signal}</div>` + div.innerHTML;
    });
  </script>
</body>
</html>
