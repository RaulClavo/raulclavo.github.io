<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Juego en Vivo</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 50px; }
    button { margin: 5px; padding: 10px 20px; font-size: 18px; }
    #signals { margin-top: 20px; font-size: 24px; }
  </style>
</head>
<body>
  <h1>Juego en Vivo</h1>
  <button id="joinBtn">Unirse</button>
  <div id="controls" style="display:none;">
    <h2>Tus señales</h2>
    <button onclick="sendSignal('A')">A</button>
    <button onclick="sendSignal('B')">B</button>
    <button onclick="sendSignal('C')">C</button>
    <button onclick="sendSignal('D')">D</button>
    <button onclick="sendSignal('E')">E</button>
  </div>

  <h2>Señales enviadas</h2>
  <div id="signals"></div>

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    // Configuración de tu Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDGYEYs5YFZqMpcU0rJSeLxdzCt1iaumis",
      authDomain: "welcomedayarise.firebaseapp.com",
      databaseURL: "https://welcomedayarise-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "welcomedayarise",
      storageBucket: "welcomedayarise.firebasestorage.app",
      messagingSenderId: "417894091538",
      appId: "1:417894091538:web:a2eab16a056dfc902881cb",
      measurementId: "G-8ZXHLVM20C"
    };

    // Inicializar Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let playerId = null;

    // Botón "Unirse"
    document.getElementById("joinBtn").onclick = async () => {
      const playersRef = db.ref("players");
      const snapshot = await playersRef.once("value");
      const players = snapshot.val() || {};

      if (Object.keys(players).length < 2) {
        playerId = Date.now().toString(); // ID simple
        playersRef.child(playerId).set(true);
        document.getElementById("controls").style.display = "block";
      } else {
        alert("Ya hay 2 jugadores, eres espectador.");
      }
    };

    // Enviar señal
    function sendSignal(signal) {
      db.ref("signals").push({ signal.toString(), from: playerId, time: Date.now() });
    }

    // Escuchar señales en vivo
    db.ref("signals").on("child_added", (snap) => {
      const data = snap.val();
      const div = document.getElementById("signals");
      div.innerHTML = `<div>${data.signal}</div>` + div.innerHTML;
    });
  </script>
</body>
</html>
