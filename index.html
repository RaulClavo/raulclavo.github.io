<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Juego en Vivo</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 40px; }
    button { margin: 5px; padding: 10px 18px; font-size: 16px; }
    #signals { margin-top: 20px; font-size: 16px; text-align:left; max-width:700px; margin-left:auto; margin-right:auto; }
    #status { margin: 14px 0; font-size: 18px; font-weight: bold; }
    #voteArea { margin: 14px 0; }
    #gameArea { margin-top: 18px; font-weight: bold; color: #155; }
    #votesStatus { margin-top: 8px; font-style: italic; }
    #playersInfo { margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Juego en Vivo</h1>

  <div id="status">Comprobando estado...</div>

  <div>
    <button id="joinBtn">Unirse</button>
    <button id="leaveBtn" style="display:none;">Salir</button>
  </div>

  <div id="playersInfo"></div>

  <div id="controls" style="display:none; margin-top:12px;">
    <h3>Tus señales</h3>
    <button onclick="sendSignal('A')">A</button>
    <button onclick="sendSignal('B')">B</button>
    <button onclick="sendSignal('C')">C</button>
    <button onclick="sendSignal('D')">D</button>
    <button onclick="sendSignal('E')">E</button>
  </div>

  <!-- Votación (aparece cuando hay 2 jugadores y estás dentro) -->
  <div id="voteArea" style="display:none;">
    <h3>Votación del modo</h3>
    <button onclick="castVote('mode1')">Modo 1 — Una pantalla</button>
    <button onclick="castVote('mode2')">Modo 2 — Dos pantallas</button>
    <div id="votesStatus">Esperando votos...</div>
  </div>

  <div id="gameArea" style="display:none;">
    <p id="gameMsg">Juego no iniciado</p>
    <!-- Aquí más adelante pondremos el canvas / lógica del juego -->
  </div>

  <h3>Logs de señales</h3>
  <div id="signals"></div>

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    // Configuración Firebase (la tuya)
    const firebaseConfig = {
      apiKey: "AIzaSyDGYEYs5YFZqMpcU0rJSeLxdzCt1iaumis",
      authDomain: "welcomedayarise.firebaseapp.com",
      databaseURL: "https://welcomedayarise-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "welcomedayarise",
      storageBucket: "welcomedayarise.firebasestorage.app",
      messagingSenderId: "417894091538",
      appId: "1:417894091538:web:a2eab16a056dfc902881cb",
      measurementId: "G-8ZXHLVM20C"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Estado local
    let playerId = null;
    let playerRef = null;
    let gameStarted = false;
    const votes = {}; // { playerId: 'mode1' }

    // DOM
    const joinBtn = document.getElementById('joinBtn');
    const leaveBtn = document.getElementById('leaveBtn');
    const statusDiv = document.getElementById('status');
    const controlsDiv = document.getElementById('controls');
    const voteArea = document.getElementById('voteArea');
    const votesStatus = document.getElementById('votesStatus');
    const signalsDiv = document.getElementById('signals');
    const playersInfo = document.getElementById('playersInfo');
    const gameArea = document.getElementById('gameArea');
    const gameMsg = document.getElementById('gameMsg');

    // Actualizar estado del lobby (players)
    async function updateStatus() {
      const snap = await db.ref('players').once('value');
      const players = snap.val() || {};
      const ids = Object.keys(players);
      playersInfo.innerHTML = `Jugadores: ${ids.length} / 2 <br> ${ids.join(', ') || '—'}`;

      const numPlayers = ids.length;
      if (playerId && !gameStarted) {
        statusDiv.textContent = 'Estás jugando';
      } else if (!playerId && numPlayers < 2) {
        statusDiv.textContent = `Huecos libres: ${2 - numPlayers}`;
      } else if (!playerId && numPlayers >= 2) {
        statusDiv.textContent = 'Eres espectador';
      }

      // Mostramos la votación si estamos dentro y ya hay 2 jugadores (y aún no se empezó el juego)
      if (playerId && numPlayers === 2 && !gameStarted) {
        voteArea.style.display = 'block';
      } else {
        voteArea.style.display = 'none';
      }
    }

    // Listener en /players para actualizar UI en tiempo real
    db.ref('players').on('value', updateStatus);

    // Join
    joinBtn.onclick = async () => {
      const snapshot = await db.ref('players').once('value');
      const players = snapshot.val() || {};
      if (playerId) return; // ya unido en esta pestaña

      if (Object.keys(players).length < 2) {
        playerId = Date.now().toString();
        playerRef = db.ref('players/' + playerId);
        await playerRef.set({ joinedAt: Date.now() });
        // onDisconnect: eliminar si cierra pestaña o pierde conexión
        playerRef.onDisconnect().remove();

        // UI
        joinBtn.disabled = true;
        leaveBtn.style.display = 'inline-block';
        controlsDiv.style.display = 'block';
        updateStatus();
      } else {
        alert('Ya hay 2 jugadores, eres espectador.');
        updateStatus();
      }
    };

    // Leave
    leaveBtn.onclick = async () => {
      if (!playerId) return;
      await db.ref('players/' + playerId).remove();
      // limpiar estado local
      playerId = null;
      playerRef = null;
      controlsDiv.style.display = 'none';
      joinBtn.disabled = false;
      voteArea.style.display = 'none';
      updateStatus();
    };

    // Enviar señal normal
    function sendSignal(signal) {
      const valid = ['A','B','C','D','E'];
      if (!playerId) { alert('Únete primero para enviar señales'); return; }
      if (!valid.includes(signal)) return;
      db.ref('signals').push({
        signal,
        from: playerId,
        time: Date.now()
      });
    }

    // Cast vote via signals
    function castVote(mode) {
      if (!playerId) { alert('Únete primero para votar'); return; }
      if (gameStarted) { alert('Juego ya iniciado'); return; }
      db.ref('signals').push({
        signal: 'VOTE:' + mode,
        from: playerId,
        time: Date.now()
      });
    }

    // Escuchar señales en /signals (tanto logs como votos)
    db.ref('signals').on('child_added', (snap) => {
      const data = snap.val();
      if (!data) return;

      // Mostrar en logs
      const timeStr = data.time ? new Date(data.time).toLocaleTimeString() : '';
      const shortFrom = (data.from && typeof data.from === 'string') ? data.from.slice(-6) : 'anon';
      const node = document.createElement('div');
      node.textContent = `[${timeStr}] ${shortFrom} → ${data.signal}`;
      signalsDiv.prepend(node);

      // Si es voto, procesarlo
      if (typeof data.signal === 'string' && data.signal.startsWith('VOTE:')) {
        const mode = data.signal.split(':',2)[1];
        votes[data.from] = mode; // el último voto del playerId cuenta
        renderVotesUI();

        // Si ya hay 2 votos (de 2 jugadores) y el juego no ha empezado, decidimos
        const voterIds = Object.keys(votes).filter(id => !!id);
        if (!gameStarted) {
          // comprobar que las 2 entradas son de jugadores actuales
          db.ref('players').once('value').then(psnap => {
            const players = psnap.val() || {};
            const playerIds = Object.keys(players);
            const validVoters = voterIds.filter(v => playerIds.includes(v));
            if (validVoters.length >= 2) {
              // decidir por mayoría
              const modeCount = Object.values(votes).reduce((acc,m) => {
                acc[m] = (acc[m]||0) + 1; return acc;
              }, {});
              const chosen = (modeCount['mode2'] > modeCount['mode1']) ? 'mode2' : 'mode1';
              // Iniciar juego localmente para todos los clientes que ven estas señales
              startGame(chosen);
            }
          });
        }
      }
    });

    function renderVotesUI() {
      const entries = Object.entries(votes).map(([pid, m]) => `${pid.slice(-6)} → ${m}`);
      votesStatus.textContent = entries.length ? entries.join(' | ') : 'Esperando votos...';
    }

    // startGame (aquí empieza la lógica del juego; por ahora placeholder)
    function startGame(chosenMode) {
      if (gameStarted) return;
      gameStarted = true;
      voteArea.style.display = 'none';
      gameArea.style.display = 'block';
      gameMsg.textContent = 'Juego iniciado — modo: ' + chosenMode;
      statusDiv.textContent = 'Juego en marcha';
      // DESDE AQUÍ: arranca tu lógica real de juego (canvas, moves, etc.)
      // Ejemplo: podrías redirigir a game.html o mostrar/crear un canvas y conectar listeners de /moves.
      console.log('START GAME:', chosenMode);

      // (opcional) bloquear join al empezar
      joinBtn.disabled = true;
    }

    // Mostrar señales históricas al cargar (child_added hará esto)
    // update inicial del estado
    updateStatus();

    // Nota: no tocamos reglas de DB; el hecho de usar /signals para votos respeta
    // tu regla actual que sólo permite escribir /signals si `from` existe en /players.

  </script>
</body>
</html>
