<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Juego en Vivo</title>
  <style>
    body { font-family: Arial; text-align: center; margin-top: 20px; }
    button { margin: 5px; padding: 10px 18px; font-size: 16px; }
    #status { margin: 14px 0; font-size: 18px; font-weight: bold; }
    #voteArea, #controllerArea, #spectatorArea, #gameArea { display:none; margin-top:20px; }
    #votesStatus { margin-top: 8px; font-style: italic; }
    #playersInfo { margin-top: 8px; }
    #board { display: grid; grid-template-columns: repeat(5, 60px); grid-gap: 4px; justify-content: center; margin-top:20px; }
    .cell { width: 60px; height: 60px; border: 1px solid #aaa; display:flex; align-items:center; justify-content:center; font-weight:bold; }
    .goal { background: lightgreen; }
    .player { background: lightblue; }
  </style>
</head>
<body>
  <h1>Juego en Vivo</h1>

  <div id="status">Comprobando estado...</div>

  <div>
    <button id="joinBtn">Unirse</button>
    <button id="leaveBtn" style="display:none;">Salir</button>
  </div>

  <div id="playersInfo"></div>

  <!-- Votación -->
  <div id="voteArea">
    <h3>Votación del modo</h3>
    <button onclick="castVote('mode1')">Modo 1 — Una pantalla</button>
    <button onclick="castVote('mode2')">Modo 2 — Dos pantallas</button>
    <div id="votesStatus">Esperando votos...</div>
  </div>

  <!-- Área de mando (jugadores) -->
  <div id="controllerArea">
    <h2>Mando del Jugador</h2>
    <button onclick="sendSignal('FORWARD')">Avanzar</button>
    <button onclick="sendSignal('TURN_LEFT')">Girar Izq</button>
    <button onclick="sendSignal('TURN_RIGHT')">Girar Der</button>
    <button onclick="sendSignal('EXECUTE')">Ejecutar ruta</button>
  </div>

  <!-- Área de espectador -->
  <div id="spectatorArea">
    <h2>Juego en curso</h2>
    <div id="board"></div>
  </div>

  <!-- Firebase v8 -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDGYEYs5YFZqMpcU0rJSeLxdzCt1iaumis",
      authDomain: "welcomedayarise.firebaseapp.com",
      databaseURL: "https://welcomedayarise-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "welcomedayarise",
      storageBucket: "welcomedayarise.firebasestorage.app",
      messagingSenderId: "417894091538",
      appId: "1:417894091538:web:a2eab16a056dfc902881cb",
      measurementId: "G-8ZXHLVM20C"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let playerId = null;
    let playerRef = null;
    let gameStarted = false;
    const votes = {};

    const joinBtn = document.getElementById("joinBtn");
    const leaveBtn = document.getElementById("leaveBtn");
    const statusDiv = document.getElementById("status");
    const playersInfo = document.getElementById("playersInfo");
    const voteArea = document.getElementById("voteArea");
    const votesStatus = document.getElementById("votesStatus");
    const controllerArea = document.getElementById("controllerArea");
    const spectatorArea = document.getElementById("spectatorArea");
    const boardDiv = document.getElementById("board");

    // ---- Lobby ----
    async function updateStatus() {
      const snap = await db.ref("players").once("value");
      const players = snap.val() || {};
      const ids = Object.keys(players);
      playersInfo.innerHTML = `Jugadores: ${ids.length} / 2 <br> ${ids.join(", ") || "—"}`;

      if (playerId && !gameStarted) {
        statusDiv.textContent = "Estás jugando";
      } else if (!playerId && ids.length < 2) {
        statusDiv.textContent = `Huecos libres: ${2 - ids.length}`;
      } else if (!playerId && ids.length >= 2) {
        statusDiv.textContent = "Eres espectador";
      }

      if (playerId && ids.length === 2 && !gameStarted) {
        voteArea.style.display = "block";
      } else {
        voteArea.style.display = "none";
      }
    }
    db.ref("players").on("value", updateStatus);

    joinBtn.onclick = async () => {
      const snapshot = await db.ref("players").once("value");
      const players = snapshot.val() || {};
      if (playerId) return;
      if (Object.keys(players).length < 2) {
        playerId = Date.now().toString();
        playerRef = db.ref("players/" + playerId);
        await playerRef.set({ joinedAt: Date.now() });
        playerRef.onDisconnect().remove();
        joinBtn.disabled = true;
        leaveBtn.style.display = "inline-block";
        updateStatus();
      } else {
        alert("Ya hay 2 jugadores, eres espectador.");
        updateStatus();
      }
    };

    leaveBtn.onclick = async () => {
      if (!playerId) return;
      await db.ref("players/" + playerId).remove();
      playerId = null;
      playerRef = null;
      joinBtn.disabled = false;
      leaveBtn.style.display = "none";
      controllerArea.style.display = "none";
      spectatorArea.style.display = "none";
      updateStatus();
    };

    // ---- Señales ----
    function sendSignal(signal) {
      if (!playerId) { alert("Únete primero"); return; }
      db.ref("signals").push({ signal, from: playerId, time: Date.now() });
    }

    function castVote(mode) {
      if (!playerId) return;
      db.ref("signals").push({ signal: "VOTE:" + mode, from: playerId, time: Date.now() });
    }

    db.ref("signals").on("child_added", (snap) => {
      const data = snap.val();
      if (!data) return;

      if (data.signal.startsWith("VOTE:")) {
        votes[data.from] = data.signal.split(":")[1];
        votesStatus.textContent = Object.entries(votes).map(([pid, m]) => `${pid.slice(-4)}→${m}`).join(" | ");

        const voterIds = Object.keys(votes);
        if (!gameStarted && voterIds.length >= 2) {
          const count = Object.values(votes).reduce((acc,m) => { acc[m]=(acc[m]||0)+1; return acc; },{});
          const chosen = (count["mode2"] > count["mode1"]) ? "mode2" : "mode1";
          startGame(chosen);
        }
      }
    });

    // ---- Juego ----
    function startGame(mode) {
      if (gameStarted) return;
      gameStarted = true;
      voteArea.style.display = "none";

      if (playerId) {
        // Jugador → mostrar mando
        controllerArea.style.display = "block";
      } else {
        // Espectador → mostrar tablero grande
        spectatorArea.style.display = "block";
        renderBoard();
      }
      statusDiv.textContent = "Juego iniciado (" + mode + ")";
    }

    function renderBoard() {
      boardDiv.innerHTML = "";
      for (let i=0; i<25; i++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        if (i === 24) cell.classList.add("goal");
        boardDiv.appendChild(cell);
      }
    }

    updateStatus();
  </script>
</body>
</html>
